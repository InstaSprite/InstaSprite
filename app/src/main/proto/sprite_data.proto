syntax = "proto3";

option java_package = "com.instasprite.app";
option java_multiple_files = true;

message CelData {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
  bytes pixels = 5;
}

message LayerData {
  string id = 1;
  string name = 2;
  bool is_visible = 3;
  bool is_locked = 4;
  bytes pixels = 5;
  CelData cel = 6;
}

message ISprite {
  repeated LayerData layers = 1;
  repeated int32 color_palette = 2;
  int32 width = 3;
  int32 height = 4;
}
