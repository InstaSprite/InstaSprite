syntax = "proto3";

option java_package = "com.olaz.instasprite";
option java_multiple_files = true;

message LayerData {
  string id = 1;
  string name = 2;
  bool is_visible = 3;
  bool is_locked = 4;
  repeated int32 pixels = 5;
}

message SpritePixels {
  repeated LayerData layers = 1;
  repeated int32 color_palette = 2;
  int32 width = 3;
  int32 height = 4;
}
