name: Deploy to Play Console (Closed Testing)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode local.properties
        env:
          LOCAL_PROPERTIES_BASE64: ${{ secrets.LOCAL_PROPERTIES_BASE64 }}
        run: echo "$LOCAL_PROPERTIES_BASE64" | base64 --decode > local.properties

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > app/google-services.json

      - name: Decode Keystore
        env:
          PLAY_STORE_KEYSTORE_BASE64: ${{ secrets.PLAY_STORE_KEYSTORE_BASE64 }}
        run: echo "$PLAY_STORE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Decode Play Console Credentials
        env:
          PLAY_STORE_CREDENTIALS_BASE64: ${{ secrets.PLAY_STORE_CREDENTIALS_BASE64 }}
        run: echo "$PLAY_STORE_CREDENTIALS_BASE64" | base64 --decode > play-store-service-account.json

      - name: Build Release AAB
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION_CODE=$((${{ github.run_number }} + 3))
          ./gradlew bundleRelease -PciVersionCode=$VERSION_CODE

      - name: Upload to Play Console Closed Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-store-service-account.json
          packageName: com.instasprite.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: alpha
          status: completed
